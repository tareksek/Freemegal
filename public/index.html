
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>دردشة عشوائية - متطورة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== شاشة التحقق من العمر ========== -->
  <div id="ageScreen" class="screen active">
    <div class="card">
      <h2>⚠️ تأكيد العمر</h2>
      <p>هل عمرك 18 سنة أو أكثر؟</p>
      <div class="btn-group">
        <button id="ageYes" class="btn primary">✅ نعم</button>
        <button id="ageNo" class="btn danger">❌ لا</button>
      </div>
    </div>
  </div>

  <!-- ========== شاشة اختيار الجنس ========== -->
  <div id="genderScreen" class="screen">
    <div class="card">
      <h2>👤 اختر جنسك</h2>
      <div class="btn-group">
        <button class="btn gender-btn" data-gender="male">ذكر</button>
        <button class="btn gender-btn" data-gender="female">أنثى</button>
      </div>
    </div>
  </div>

  <!-- ========== شاشة تفضيل الجنس (مقفلة حتى تأكيد البريد) ========== -->
  <div id="prefScreen" class="screen">
    <div class="card">
      <h2>🎯 تفضيلات التواصل</h2>
      <p id="prefStatus">يجب تأكيد بريدك الإلكتروني لتفعيل هذه الميزة.</p>
      <div id="emailSection" style="display: none;">
        <input type="email" id="emailInput" placeholder="بريدك الإلكتروني" />
        <button id="sendCodeBtn" class="btn secondary">📧 إرسال رمز التأكيد</button>
        <div id="codeSection" style="display: none; margin-top: 15px;">
          <input type="text" id="codeInput" placeholder="أدخل الرمز السري" />
          <button id="verifyCodeBtn" class="btn primary">✓ تأكيد</button>
        </div>
        <div id="emailMsg" class="msg"></div>
      </div>
      <button id="toggleEmailBtn" class="btn outline">📧 تفعيل التفضيل عبر البريد</button>
      <div id="prefOptions" style="display: none; margin-top: 20px;">
        <label>الجنس المفضل للتحدث معه:</label>
        <div class="btn-group">
          <button class="btn pref-btn" data-pref="male">ذكر</button>
          <button class="btn pref-btn" data-pref="female">أنثى</button>
          <button class="btn pref-btn active" data-pref="all">الكل</button>
        </div>
      </div>
      <button id="goToChatBtn" class="btn primary" style="margin-top: 25px;">🚀 دخول الدردشة</button>
    </div>
  </div>

  <!-- ========== شاشة الدردشة الرئيسية ========== -->
  <div id="chatScreen" class="screen">
    <div class="chat-layout">
      <!-- فيديو الشريك كبير -->
      <div class="remote-video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="partnerLabel" class="partner-label">الشريك</div>
      </div>

      <!-- فيديو المستخدم صغير أسفل اليمين -->
      <div class="local-video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="local-label">أنت</div>
      </div>

      <!-- صندوق الدردشة النصية -->
      <div id="chatBox" class="chat-box">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="messageInput" placeholder="اكتب رسالة..." />
          <button id="sendBtn" class="btn small">✉️</button>
        </div>
      </div>

      <!-- شريط الحالة العلوي -->
      <div id="statusBar" class="status-bar">جاهز للبحث</div>

      <!-- أزرار التحكم السفلية -->
      <div class="controls-bar">
        <button id="findBtn" class="btn primary">🔍 البحث عن شريك</button>
        <button id="nextBtn" class="btn secondary" disabled>⏭ التالي</button>
        <button id="disconnectBtn" class="btn danger" disabled>❌ قطع</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
